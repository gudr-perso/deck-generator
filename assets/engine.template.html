<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!--{{DECK_TITLE}}--></title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,600&family=JetBrains+Mono:wght@500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* ===== Charte réseau Cuma ===== */
  --dark-deep:#04271b; --dark:#0a3d2b;              /* fonds sombres (vert profond) */
  --orange:#ff8200; --orange-bright:#ff9d3d;        /* Pantone 151 C */
  --green:#31b700; --green-light:#93c90e;           /* Pantone 2421 C / 2292 C */
  --green-deep:#00965e; --green-ink:#08512f;        /* Pantone 340 C */
  --blue:#b1dce2;                                    /* Pantone 628 C */
  /* alias de rôles (accent secondaire) */
  --cyan:#00965e; --cyan-light:#31b700; --cyan-deep:#0a7a52; --cyan-ink:#06402b;
  --ice:#dcefe6; --ice-soft:#f2f9fb; --paper:#f2f9fb; --peach:#ecf8f0;
  --ink:#232020; --ink-soft:#4a4545; --white:#fff; --line:#e4e8e2;
  --f-serif:'Fraunces',Georgia,serif; --f-sans:'Manrope',system-ui,sans-serif; --f-mono:'JetBrains Mono',monospace;

  /*{{THEME_VARS}}*/
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--dark);overflow:hidden;font-family:var(--f-sans);}
.deck{position:relative;width:100%;height:100vh;overflow:hidden;}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:50px 72px;opacity:0;pointer-events:none;transition:opacity .5s ease,transform .5s ease;transform:translateX(60px);overflow:auto;}
.slide.active{opacity:1;pointer-events:all;transform:translateX(0);}
.slide.prev{opacity:0;transform:translateX(-60px);}

/* NAV */
.nav{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:16px;z-index:100;}
#dots{display:flex;gap:6px;flex-wrap:wrap;max-width:60vw;justify-content:center;}
.nav-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .25s ease;border:none;}
.nav-dot.on{background:var(--orange);transform:scale(1.35);}
.nav-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.nav-btn:hover{background:rgba(255,255,255,.18);}
.nav-btn:disabled{opacity:.25;cursor:default;}
.nav.dark .nav-dot{background:rgba(35,32,32,.2);}
.nav.dark .nav-dot.on{background:var(--orange);}
.nav.dark .nav-btn{background:rgba(35,32,32,.08);border-color:rgba(35,32,32,.2);color:var(--ink);}
.nav.dark .nav-btn:hover{background:rgba(35,32,32,.15);}
.nav.dark .nav-btn:disabled{opacity:.2;}
.logo-badge.dark{color:var(--green-deep);}
.counter.dark{color:rgba(35,32,32,.35);}

/* CHROME */
.counter{position:fixed;top:24px;right:32px;font-family:var(--f-mono);font-size:11px;font-weight:700;letter-spacing:.12em;color:rgba(255,255,255,.32);z-index:100;}
.logo-badge{position:fixed;top:24px;left:32px;font-family:var(--f-mono);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green-light);z-index:100;}
.progress{position:fixed;top:0;left:0;height:3px;background:var(--orange);transition:width .4s ease;z-index:200;}

/* ===== GÉNÉRIQUES ===== */
.eyebrow{font-family:var(--f-mono);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan-light);margin-bottom:15px;display:flex;align-items:center;gap:10px;}
.eyebrow::before{content:'';width:32px;height:1px;background:currentColor;}
.eyebrow.light{color:var(--cyan-deep);}
.eyebrow.onpeach{color:var(--orange);}
h2.title{font-family:var(--f-serif);font-weight:800;letter-spacing:-.03em;line-height:1.05;}
em{font-style:italic;color:var(--orange);}
.time-pill{display:inline-flex;align-items:center;gap:7px;background:rgba(49,183,0,.14);border:1px solid rgba(49,183,0,.35);border-radius:999px;padding:6px 15px;font-family:var(--f-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--green-light);}
.vid-note{display:inline-flex;align-items:center;gap:8px;background:rgba(255,130,0,.12);border:1px solid rgba(255,130,0,.35);border-radius:999px;padding:6px 15px;font-family:var(--f-mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--orange);margin-top:14px;}
.ph{display:inline-flex;align-items:center;gap:8px;background:rgba(255,130,0,.16);border:1px dashed rgba(255,130,0,.55);border-radius:999px;padding:6px 15px;font-family:var(--f-mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--orange-bright);margin-bottom:16px;}

/* ===== COVER ===== */
.s-cover{background:var(--dark);}
.s-cover::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(255,130,0,.20) 0%,transparent 50%),radial-gradient(ellipse at 10% 80%,rgba(49,183,0,.22) 0%,transparent 52%);}
.s-cover::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:60px 60px;}
.s-cover .inner{position:relative;z-index:1;text-align:center;max-width:840px;}
.s-cover .tag{display:inline-flex;align-items:center;gap:8px;background:rgba(255,130,0,.12);border:1px solid rgba(255,130,0,.35);border-radius:999px;padding:8px 20px;font-family:var(--f-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);margin-bottom:34px;}
.s-cover h1{font-family:var(--f-serif);font-size:clamp(2.8rem,6.6vw,5.2rem);font-weight:900;line-height:.98;letter-spacing:-.04em;color:var(--white);margin-bottom:22px;}
.s-cover h1 em{color:var(--orange);}
.s-cover .sub{font-size:1.1rem;color:rgba(255,255,255,.62);max-width:600px;margin:0 auto 30px;line-height:1.6;}
.s-cover .meta{font-family:var(--f-mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.4);}

/* ===== DIVIDER ===== */
.s-div{background:var(--dark);}
.s-div::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(49,183,0,.12) 0%,transparent 60%),radial-gradient(ellipse at 85% 90%,rgba(255,130,0,.13) 0%,transparent 55%);}
.s-div .inner{position:relative;z-index:1;text-align:center;max-width:760px;}
.s-div .bignum{font-family:var(--f-serif);font-size:5rem;font-weight:900;color:rgba(255,255,255,.28);line-height:1;letter-spacing:-.04em;margin-bottom:6px;}
.s-div h2{font-family:var(--f-serif);font-size:clamp(2.2rem,5vw,3.6rem);font-weight:900;color:var(--white);letter-spacing:-.035em;line-height:1;margin-bottom:18px;}
.s-div h2 em{color:var(--orange);}
.s-div p{font-size:1rem;color:rgba(255,255,255,.58);line-height:1.6;max-width:500px;margin:0 auto 22px;}

/* ===== POINTS (clair 2 col) ===== */
.s-points{background:var(--paper);}
.s-points .inner{max-width:940px;width:100%;}
.s-points .grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
.s-points h2{font-family:var(--f-serif);font-size:clamp(1.7rem,3.5vw,2.6rem);font-weight:800;color:var(--ink);line-height:1.08;letter-spacing:-.03em;margin-bottom:22px;}
.s-points h2 em{color:var(--orange);}
.pain-item{display:flex;gap:14px;align-items:flex-start;padding:18px 20px;border-radius:14px;background:var(--white);border:1px solid var(--line);transition:border-color .2s;}
.pain-item:hover{border-color:var(--orange);}
.pain-icon{width:34px;height:34px;border-radius:10px;background:rgba(255,130,0,.1);color:var(--orange);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;font-weight:700;}
.pain-icon.ok{background:rgba(0,150,94,.12);color:var(--green-deep);}
.pain-text{font-size:.94rem;color:var(--ink-soft);line-height:1.5;}
.pain-text strong{color:var(--ink);display:block;margin-bottom:3px;font-weight:700;}

/* ===== STEPS (sombre) ===== */
.s-steps{background:var(--dark);}
.s-steps::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(49,183,0,.09) 0%,transparent 70%);}
.s-steps .inner{text-align:center;position:relative;z-index:1;width:100%;max-width:1040px;}
.s-steps h2{font-family:var(--f-serif);font-size:clamp(1.7rem,3.4vw,2.6rem);font-weight:800;color:var(--white);letter-spacing:-.03em;margin-bottom:14px;}
.s-steps h2 em{color:var(--orange);}
.s-steps .lead{font-size:.98rem;color:rgba(255,255,255,.55);max-width:640px;margin:0 auto 32px;line-height:1.55;}
.steps-row{display:flex;width:100%;align-items:stretch;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.08);}
.step-box{flex:1;padding:22px 18px;display:flex;flex-direction:column;gap:8px;border-right:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);text-align:left;}
.step-box.de{background:rgba(49,183,0,.07);}
.step-box:last-child{border-right:none;}
.step-letter{font-family:var(--f-serif);font-size:2.4rem;font-weight:900;line-height:1;letter-spacing:-.04em;color:var(--green-light);}
.step-name{font-family:var(--f-mono);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green-light);}
.step-desc{font-size:.84rem;color:rgba(255,255,255,.55);line-height:1.5;}

/* ===== TWO (clair) ===== */
.s-two{background:var(--ice-soft);}
.s-two .inner{max-width:900px;width:100%;}
.s-two h2{font-family:var(--f-serif);font-size:clamp(1.7rem,3.5vw,2.5rem);font-weight:800;color:var(--ink);letter-spacing:-.03em;line-height:1.08;margin-bottom:8px;}
.s-two h2 em{color:var(--orange);}
.s-two .sub{font-size:.98rem;color:var(--ink-soft);line-height:1.55;margin-bottom:22px;max-width:720px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.phase-card{background:var(--white);border-radius:20px;padding:26px;border:1px solid var(--line);position:relative;overflow:hidden;}
.phase-card.lite{border-color:var(--green-deep);box-shadow:0 8px 30px rgba(0,150,94,.1);}
.phase-card.lite::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--green-deep);}
.phase-card.accent{border-color:var(--orange);box-shadow:0 8px 30px rgba(255,130,0,.1);}
.phase-card.accent::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--orange);}
.phase-card.accent .phase-card-title{color:var(--orange);}
.phase-card-letter{font-family:var(--f-serif);font-size:2.4rem;font-weight:900;letter-spacing:-.04em;color:var(--orange);margin-bottom:2px;line-height:1;}
.phase-card.lite .phase-card-letter{color:var(--green-deep);}
.phase-card-title{font-family:var(--f-mono);font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--cyan-deep);margin-bottom:12px;}
.phase-card-sub{font-size:.92rem;color:var(--ink-soft);margin-bottom:12px;line-height:1.55;}
.check-list{display:flex;flex-direction:column;gap:7px;}
.check-item{display:flex;gap:10px;align-items:flex-start;font-size:.9rem;color:var(--ink-soft);line-height:1.4;}
.check-item::before{content:'→';color:var(--orange);font-weight:700;flex-shrink:0;font-family:var(--f-mono);}
.result-pill{display:inline-flex;align-items:center;gap:6px;background:var(--ice);color:var(--green-ink);border-radius:999px;padding:8px 16px;font-family:var(--f-mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-top:18px;}
.phase-card.accent .result-pill{background:rgba(255,130,0,.12);color:#9a4d00;}

/* ===== THREE (clair) ===== */
.s-three{background:var(--paper);}
.s-three .inner{max-width:980px;width:100%;}
.s-three h2{font-family:var(--f-serif);font-size:clamp(1.8rem,3.6vw,2.6rem);font-weight:800;color:var(--ink);letter-spacing:-.03em;line-height:1.08;margin-bottom:24px;}
.s-three h2 em{color:var(--orange);}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.cap-card{background:var(--white);border-radius:20px;padding:24px;border:1px solid var(--line);transition:border-color .25s,transform .25s;position:relative;overflow:hidden;}
.cap-card:hover{border-color:var(--green-deep);transform:translateY(-4px);}
.cap-card.featured{border-color:var(--green-deep);box-shadow:0 8px 30px rgba(0,150,94,.1);}
.cap-card.featured::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--green-deep);}
.cap-card.accent{border-color:var(--orange);box-shadow:0 8px 30px rgba(255,130,0,.1);}
.cap-card.accent::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--orange);}
.cap-card.accent:hover{border-color:var(--orange);}
.cap-card.accent .cap-output{color:var(--orange);}
.cap-num{font-family:var(--f-serif);font-size:2.2rem;font-weight:900;color:var(--orange);line-height:1;margin-bottom:8px;letter-spacing:-.04em;}
.cap-card.featured .cap-num{color:var(--green-deep);}
.cap-title{font-size:1.06rem;font-weight:700;color:var(--ink);margin-bottom:9px;}
.cap-body{font-size:.91rem;color:var(--ink-soft);line-height:1.55;}
.cap-output{margin-top:15px;padding-top:12px;border-top:1px solid var(--line);font-family:var(--f-mono);font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--cyan-deep);}

/* ===== STATS (sombre) ===== */
.s-stats{background:var(--dark);}
.s-stats::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 85% 15%,rgba(255,130,0,.16) 0%,transparent 55%),radial-gradient(ellipse at 5% 90%,rgba(49,183,0,.16) 0%,transparent 52%);}
.s-stats .inner{position:relative;z-index:1;max-width:920px;width:100%;}
.s-stats h2{font-family:var(--f-serif);font-size:clamp(1.7rem,3.4vw,2.5rem);font-weight:800;color:var(--white);letter-spacing:-.03em;margin-bottom:30px;}
.s-stats h2 em{color:var(--orange);}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:24px;}
.stat-box{background:rgba(255,255,255,.04);border-radius:16px;padding:22px;border:1px solid rgba(255,255,255,.08);}
.stat-num{font-family:var(--f-serif);font-size:2.5rem;font-weight:900;color:var(--orange);line-height:1;letter-spacing:-.04em;margin-bottom:10px;}
.stat-label{font-size:.86rem;color:rgba(255,255,255,.55);line-height:1.5;}
.conviction{background:rgba(49,183,0,.08);border:1px solid rgba(49,183,0,.2);border-radius:16px;padding:22px 26px;border-left:3px solid var(--orange);}
.conviction p{font-family:var(--f-serif);font-size:1.1rem;font-weight:600;font-style:italic;color:var(--white);line-height:1.55;}
.conviction p em{color:var(--orange);font-style:normal;font-weight:700;}

/* ===== CTA (peach clair) ===== */
.s-cta{background:var(--peach);}
.s-cta::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 10%,rgba(255,130,0,.12) 0%,transparent 55%),radial-gradient(ellipse at 15% 90%,rgba(0,150,94,.1) 0%,transparent 52%);}
.s-cta .inner{text-align:center;max-width:700px;position:relative;z-index:1;}
.s-cta h2{font-family:var(--f-serif);font-size:clamp(2rem,4.6vw,3.6rem);font-weight:900;color:var(--ink);letter-spacing:-.035em;line-height:1;margin-bottom:18px;}
.s-cta h2 em{color:var(--orange);}
.s-cta .sub{font-size:1.05rem;color:var(--ink-soft);margin-bottom:30px;line-height:1.6;}
.s-cta .tagline{margin-top:28px;font-family:var(--f-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(35,32,32,.4);}

/* ===== LIST (clair) ===== */
.s-list{background:var(--ice-soft);}
.s-list .inner{max-width:880px;width:100%;}
.s-list h2{font-family:var(--f-serif);font-size:clamp(1.8rem,3.6vw,2.6rem);font-weight:800;color:var(--ink);letter-spacing:-.03em;line-height:1.08;margin-bottom:22px;}
.s-list h2 em{color:var(--orange);}
.num-list{display:flex;flex-direction:column;gap:11px;}
.num-item{display:flex;gap:16px;align-items:flex-start;background:var(--white);border:1px solid var(--line);border-radius:14px;padding:16px 20px;transition:border-color .2s;}
.num-item:hover{border-color:var(--orange);}
.num-badge{flex-shrink:0;width:34px;height:34px;border-radius:10px;background:rgba(255,130,0,.1);color:var(--orange);font-family:var(--f-serif);font-weight:900;font-size:1.1rem;display:flex;align-items:center;justify-content:center;}
.num-body{font-size:.95rem;color:var(--ink-soft);line-height:1.5;}
.num-body strong{color:var(--ink);font-weight:700;}
.num-body a{color:var(--green-deep);font-weight:600;text-decoration:none;border-bottom:1px solid rgba(0,150,94,.35);}
.num-body a:hover{border-bottom-color:var(--green-deep);}

/* ===== BIG (sombre) ===== */
.s-big{background:var(--dark);}
.s-big::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 25%,rgba(49,183,0,.14) 0%,transparent 55%),radial-gradient(ellipse at 20% 85%,rgba(255,130,0,.12) 0%,transparent 55%);}
.s-big .inner{position:relative;z-index:1;text-align:center;max-width:840px;}
.s-big h2{font-family:var(--f-serif);font-size:clamp(1.9rem,4.2vw,3.2rem);font-weight:900;color:var(--white);letter-spacing:-.035em;line-height:1.08;margin-bottom:22px;}
.s-big h2 em{color:var(--orange);}
.s-big>.inner>p{font-size:1.12rem;color:rgba(255,255,255,.6);line-height:1.65;max-width:620px;margin:0 auto;}
.lead-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-left:3px solid var(--green-light);border-radius:14px;padding:22px 28px;margin:0 auto 18px;text-align:left;max-width:720px;}
.lead-card p{font-size:1.02rem;color:rgba(255,255,255,.72);line-height:1.6;}
.lead-card p strong{color:var(--white);}
.punch{font-family:var(--f-serif);font-style:italic;font-size:1.35rem;font-weight:600;color:var(--white);line-height:1.4;max-width:640px;margin:6px auto 0;}
.punch em{color:var(--orange);font-style:normal;font-weight:700;}

/* ===== IMG (clair) ===== */
.s-img{background:var(--ice-soft);}
.s-img .inner{max-width:1000px;width:100%;}
.s-img h2{font-family:var(--f-serif);font-size:clamp(1.6rem,3.3vw,2.4rem);font-weight:800;color:var(--ink);letter-spacing:-.03em;line-height:1.08;margin-bottom:8px;}
.s-img h2 em{color:var(--orange);}
.s-img .sub{font-size:.96rem;color:var(--ink-soft);line-height:1.5;margin-bottom:16px;max-width:760px;}
.s-img .figure{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 6px 24px rgba(4,39,27,.06);}
.s-img .figure img{width:100%;height:auto;display:block;border-radius:8px;}
.s-img .figure figcaption{font-family:var(--f-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan-deep);text-align:center;margin-top:11px;}
.s-img .figure.warn{border-color:rgba(0,150,94,.45);box-shadow:0 6px 24px rgba(0,150,94,.1);}
.warn-note{background:#fff6ef;border:1px solid rgba(255,130,0,.3);border-left:3px solid var(--orange);border-radius:12px;padding:13px 20px;font-size:.9rem;color:var(--ink-soft);line-height:1.5;margin-top:14px;text-align:left;}
.warn-note strong{color:#9a4d00;}
.figfeux{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;justify-content:center;}
.feu{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 16px;font-size:.85rem;color:var(--ink-soft);}
.feu b{color:var(--ink);}
.feu .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.feu .r{background:#e23b3b;} .feu .o{background:var(--orange);} .feu .g{background:var(--green-deep);}
.trio{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px;}
.trio .figure{margin:0;padding:12px;}

<body>
<div class="deck" id="deck">
  <div class="progress" id="progress"></div>
  <div class="logo-badge"></div>
  <div class="counter" id="counter">01 / 43</div>

  <!--{{SLIDES}}-->
</div>
<div class="nav">
  <button class="nav-btn" id="prev">‹</button>
  <div id="dots"></div>
  <button class="nav-btn" id="next">›</button>
</div>
<script>
// ===== Vue présentateur : URL de base + mode courant =====
const BASE = location.href.split('#')[0];
const _hp  = new URLSearchParams(location.hash.replace(/^#/,''));
const MODE = _hp.has('presenter') ? 'presenter' : _hp.has('bare') ? 'bare' : 'public';
const PRESENTER_CSS = `
  :root{ --pv-k:.54; }
  #pv-root{position:fixed;inset:0;background:#04271b;color:#fff;font-family:'Manrope',system-ui,sans-serif;display:flex;flex-direction:column;z-index:10000;padding:14px 18px;gap:12px;}
  .pv-head{display:flex;align-items:center;justify-content:space-between;gap:16px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.45);}
  .pv-head-notice{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pv-timer{display:flex;align-items:center;gap:12px;text-transform:none;letter-spacing:normal;flex:0 0 auto;}
  #pv-clock{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;letter-spacing:.06em;color:#fff;}
  #pv-delta{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.04em;}
  #pv-delta.late{color:#ff6b57;} #pv-delta.early{color:#3ad29f;} #pv-delta.ontime{color:rgba(255,255,255,.55);}
  .pv-stage{flex:1;display:flex;gap:18px;align-items:flex-start;justify-content:center;}
  .pv-col{display:flex;flex-direction:column;gap:8px;}
  .pv-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.14em;color:rgba(255,255,255,.5);}
  .pv-next-label{color:#ff8200;}
  .pv-box{position:relative;width:calc(1280px*var(--pv-k));height:calc(720px*var(--pv-k));overflow:hidden;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:#000;}
  .pv-frame{width:1280px;height:720px;border:0;transform:scale(var(--pv-k));transform-origin:top left;pointer-events:none;}
  #pv-fin{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#04271b;color:rgba(255,255,255,.5);font-family:'Fraunces',Georgia,serif;font-size:2rem;z-index:5;}
  .pv-ctrl{display:flex;align-items:center;justify-content:center;gap:20px;}
  .pv-btn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:20px;cursor:pointer;}
  .pv-btn:hover{background:rgba(255,255,255,.18);}
  .pv-btn:disabled{opacity:.25;cursor:default;}
  .pv-counter{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;letter-spacing:.1em;min-width:90px;text-align:center;}
  .pv-notes{display:flex;gap:18px;height:190px;flex:0 0 auto;}
  .pv-panel{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0;}
  .pv-panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:20px;}
  .pv-ntitle{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.14em;color:rgba(255,255,255,.5);white-space:nowrap;}
  .pv-nright{display:flex;align-items:center;gap:8px;}
  .pv-save-status{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;color:rgba(255,255,255,.4);white-space:nowrap;}
  .pv-nbtns{display:flex;gap:6px;}
  .pv-nbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:12px;padding:3px 9px;border-radius:6px;cursor:pointer;line-height:1.4;font-family:'Manrope',system-ui,sans-serif;}
  .pv-nbtn:hover{background:rgba(255,255,255,.18);}
  #pv-prep{flex:1;overflow:auto;background:#03211a;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.5;color:rgba(255,255,255,.9);white-space:pre-wrap;}
  #pv-prep.empty{color:rgba(255,255,255,.3);font-style:italic;}
  #pv-day{flex:1;resize:none;background:#04271b;border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:12px 14px;font-family:'Manrope',system-ui,sans-serif;font-size:14px;line-height:1.5;color:#eafff4;outline:none;}
  #pv-day:focus{border-color:#ff8200;}
`;
const PRESENTER_HTML = `
  <div id="pv-root">
    <div class="pv-head">
      <span class="pv-head-notice">Vue présentateur — cette fenêtre n'est pas partagée dans le Meet</span>
      <span class="pv-timer">
        <span id="pv-clock">00:00</span>
        <span id="pv-delta"></span>
        <button id="pv-timer-toggle" class="pv-nbtn">▶ Démarrer</button>
        <button id="pv-timer-reset" class="pv-nbtn">↺</button>
      </span>
    </div>
    <div class="pv-stage">
      <div class="pv-col"><div class="pv-label">En cours</div><div class="pv-box" id="pv-a"></div></div>
      <div class="pv-col"><div class="pv-label pv-next-label">Suivant ▶</div><div class="pv-box" id="pv-b"><div id="pv-fin">Fin</div></div></div>
    </div>
    <div class="pv-notes">
      <div class="pv-panel">
        <div class="pv-panel-head"><div class="pv-ntitle" id="pv-prep-title">📌 Préparation</div></div>
        <div id="pv-prep"></div>
      </div>
      <div class="pv-panel">
        <div class="pv-panel-head">
          <div class="pv-ntitle" id="pv-day-title">✍️ Notes du jour</div>
          <div class="pv-nright"><span class="pv-save-status" id="pv-day-status"></span><span class="pv-nbtns" id="pv-nbtns"></span></div>
        </div>
        <textarea id="pv-day" placeholder="Notes de cette session…"></textarea>
      </div>
    </div>
    <div class="pv-ctrl">
      <button id="pv-prev" class="pv-btn">◀</button>
      <div id="pv-counter" class="pv-counter">01 / 01</div>
      <button id="pv-next" class="pv-btn">▶</button>
    </div>
  </div>
`;
// ===== Notes de PRÉPARATION accrochées au deck (voir docs/.../notes-par-diapo) =====
// Clés = numéro de diapo AFFICHÉ (1-based). Éditez le texte entre guillemets.
// Une entrée vide → placeholder « Pas de note de préparation » dans le présentateur.
const PREP_NOTES = {/*{{PREP_NOTES}}*/};
// Jalons du timer présentateur, seedés par le générateur (voir references/engine-contract.md).
const MILESTONES = {/*{{MILESTONES}}*/};
const slides=document.querySelectorAll('.slide');
const dots=document.getElementById('dots');
const prevBtn=document.getElementById('prev');
const nextBtn=document.getElementById('next');
const counter=document.getElementById('counter');
const progress=document.getElementById('progress');
const N=slides.length;
let cur=0,animating=false;
let presenterWin = null;   // fenêtre présentateur (mode public uniquement)
function emitState(){
  if(presenterWin && !presenterWin.closed){
    try{ presenterWin.postMessage({type:'state',cur,N},'*'); }catch(e){}
  }
}
slides.forEach((_,i)=>{const d=document.createElement('button');d.className='nav-dot'+(i===0?' on':'');d.addEventListener('click',()=>go(i));dots.appendChild(d);});
function go(n){
  if(n<0||n>=N||n===cur||animating)return;
  animating=true;const prev=cur;
  slides[prev].classList.remove('active');slides[prev].classList.add('prev');
  cur=n;slides[cur].classList.add('active');slides[cur].scrollTop=0;
  counter.textContent=String(cur+1).padStart(2,'0')+' / '+String(N).padStart(2,'0');
  progress.style.width=((cur+1)/N*100)+'%';
  dots.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('on',i===cur));
  prevBtn.disabled=cur===0;nextBtn.disabled=cur===N-1;
  setTimeout(()=>{slides[prev].classList.remove('prev');animating=false;},500);
  updateNavTheme();
  emitState();
}
function updateNavTheme(){
  const isLight=slides[cur].dataset.theme==='light';
  document.querySelector('.nav').classList.toggle('dark',isLight);
  document.querySelector('.logo-badge').classList.toggle('dark',isLight);
  document.querySelector('.counter').classList.toggle('dark',isLight);
}
prevBtn.addEventListener('click',()=>go(cur-1));
nextBtn.addEventListener('click',()=>go(cur+1));
if(MODE==='public'){
  document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')go(cur+1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(cur-1);});
}
prevBtn.disabled=true;progress.style.width=(1/N*100)+'%';
counter.textContent='01 / '+String(N).padStart(2,'0');
updateNavTheme();
let tx=0;
if(MODE==='public'){
  document.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
  document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)dx<0?go(cur+1):go(cur-1);},{passive:true});
}
// Vidéo YouTube : lecture intégrée si servi en http(s), sinon ouverture dans un onglet (fichier local)
document.querySelectorAll('.yt-facade').forEach(function(f){
  var a=f.querySelector('.yt-poster');
  if(!a)return;
  a.addEventListener('click',function(e){
    if(location.protocol==='http:'||location.protocol==='https:'){
      e.preventDefault();
      f.innerHTML='<iframe src="'+f.dataset.embed+'" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>';
    }
  });
});

// ===== Mode NU : n'affiche qu'une diapo, sans nav, piloté par messages =====
if(MODE==='bare'){
  document.querySelectorAll('.nav,#dots,.counter,.logo-badge,.progress')
    .forEach(el=>el.style.display='none');
  const _st=document.createElement('style');
  _st.textContent='.slide{transition:none!important;transform:none!important;}';
  document.head.appendChild(_st);
  function jumpTo(n){
    n=Math.max(0,Math.min(N-1,n));
    slides.forEach((s,i)=>{ s.classList.toggle('active',i===n); s.classList.remove('prev'); });
    slides[n].scrollTop=0; cur=n;
  }
  jumpTo(parseInt(_hp.get('n')||'0',10));   // diapo initiale depuis le hash
  window.addEventListener('message',e=>{
    const m=e.data||{};
    if(m.type==='setSlide') jumpTo(m.n);
  });
}

// ===== Mode PUBLIC : ouvre/pilote la fenêtre présentateur =====
if(MODE==='public'){
  document.addEventListener('keydown',e=>{
    if(e.key==='p'||e.key==='P'){
      if(presenterWin && !presenterWin.closed){ presenterWin.focus(); return; }
      presenterWin = window.open(BASE+'#presenter','presenterView','width=1560,height=840');
      if(!presenterWin) showPopupNotice();
    }
  });
  window.addEventListener('message',e=>{
    const m=e.data||{};
    if(m.type==='presenterReady') emitState();     // envoie l'état courant
    else if(m.type==='go') go(m.n);                // navigation demandée par le présentateur
  });
}
function showPopupNotice(){
  const d=document.createElement('div');
  d.textContent='Autorisez les popups pour ce fichier, puis réappuyez sur P.';
  d.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#04271b;color:#fff;font-family:monospace;font-size:12px;padding:10px 16px;border-radius:8px;border:1px solid #ff8200;z-index:9999;';
  document.body.appendChild(d); setTimeout(()=>d.remove(),6000);
}

// ===== Mode PRÉSENTATEUR : tableau de bord (en cours + suivant) =====
if(MODE==='presenter'){
  document.title='Vue présentateur';
  document.querySelectorAll('.deck,.nav,#dots,.counter,.logo-badge,.progress')
    .forEach(el=>el.style.display='none');
  document.body.style.overflow='hidden';
  const _s=document.createElement('style'); _s.textContent=PRESENTER_CSS; document.head.appendChild(_s);
  document.body.insertAdjacentHTML('beforeend', PRESENTER_HTML);

  let pcur=0,pN=1,built=false,ifA=null,ifB=null;
  const elCounter=document.getElementById('pv-counter');
  const elPrev=document.getElementById('pv-prev');
  const elNext=document.getElementById('pv-next');
  const boxA=document.getElementById('pv-a');
  const boxB=document.getElementById('pv-b');
  const fin=document.getElementById('pv-fin');

  // ===== Notes par diapo (préparation en lecture seule + notes du jour éditables) =====
  const elPrep=document.getElementById('pv-prep');
  const elPrepTitle=document.getElementById('pv-prep-title');
  const elDay=document.getElementById('pv-day');
  const elDayTitle=document.getElementById('pv-day-title');
  const elNbtns=document.getElementById('pv-nbtns');
  const elStatus=document.getElementById('pv-day-status');
  const LS_KEY='rfe_notes_jour';
  let dayNotes={}, fileHandle=null;
  try{ dayNotes=JSON.parse(localStorage.getItem(LS_KEY)||'{}')||{}; }catch(e){ dayNotes={}; }

  function setStatus(t){ if(elStatus) elStatus.textContent=t||''; }
  function persistLocal(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(dayNotes)); }catch(e){} }
  async function writeFile(handle,obj){ const w=await handle.createWritable(); await w.write(JSON.stringify(obj,null,2)); await w.close(); }

  // Écrit la valeur du textarea dans dayNotes pour la diapo AFFICHÉE (pcur+1), puis persiste.
  function commitDay(){
    const k=String(pcur+1);
    const v=elDay.value;
    if((dayNotes[k]||'')===v) return;      // rien de neuf
    dayNotes[k]=v; persistLocal();
    if(fileHandle){ writeFile(fileHandle,dayNotes).then(()=>setStatus('● '+(fileHandle.name||'lié')+' — enregistré')).catch(()=>setStatus('⚠ erreur fichier')); }
  }
  // Remplit les deux panneaux pour la diapo courante (pcur+1).
  function showNotes(){
    const k=pcur+1;
    if(elPrepTitle) elPrepTitle.textContent='📌 Préparation — diapo '+k;
    if(elDayTitle)  elDayTitle.textContent ='✍️ Notes du jour — diapo '+k;
    const prep=(PREP_NOTES && PREP_NOTES[k]!=null) ? String(PREP_NOTES[k]) : '';
    if(prep){ elPrep.textContent=prep; elPrep.classList.remove('empty'); }
    else { elPrep.textContent='Pas de note de préparation'; elPrep.classList.add('empty'); }
    elDay.value = dayNotes[String(k)] || '';
  }
  elDay.addEventListener('blur', commitDay);
  window.addEventListener('beforeunload', commitDay);

  // Boutons fichier : File System Access (Chrome/Edge) ou fallback téléchargement/import.
  function mkBtn(label){ const b=document.createElement('button'); b.className='pv-nbtn'; b.textContent=label; return b; }
  if(window.showSaveFilePicker){
    const fsTypes=[{description:'Notes',accept:{'application/json':['.json']}}];
    const bLoad=mkBtn('📂 Charger'), bNew=mkBtn('🆕 Créer');
    bLoad.addEventListener('click',async()=>{
      try{
        const [h]=await window.showOpenFilePicker({types:fsTypes});
        const txt=await (await h.getFile()).text();
        dayNotes=(txt.trim()?JSON.parse(txt):{})||{};   // le fichier fait foi
        fileHandle=h; persistLocal(); showNotes(); setStatus('● '+h.name+' — lié');
      }catch(e){ if(e && e.name!=='AbortError') setStatus('⚠ ouverture'); }
    });
    bNew.addEventListener('click',async()=>{
      try{
        const h=await window.showSaveFilePicker({suggestedName:'notes-jour.json',types:fsTypes});
        fileHandle=h; commitDay(); await writeFile(h,dayNotes); setStatus('● '+h.name+' — lié');
      }catch(e){ if(e && e.name!=='AbortError') setStatus('⚠ création'); }
    });
    elNbtns.append(bLoad,bNew);
    setStatus('miroir local');
  } else {
    const bDl=mkBtn('💾 Télécharger'), bImp=mkBtn('📂 Importer');
    const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,application/json'; inp.style.display='none';
    bDl.addEventListener('click',()=>{
      commitDay();
      const a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob([JSON.stringify(dayNotes,null,2)],{type:'application/json'}));
      a.download='notes-jour.json'; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    });
    inp.addEventListener('change',()=>{
      const f=inp.files&&inp.files[0]; if(!f)return;
      const r=new FileReader();
      r.onload=()=>{ try{ dayNotes=JSON.parse(r.result||'{}')||{}; persistLocal(); showNotes(); setStatus('importé : '+f.name); }catch(e){ setStatus('⚠ JSON invalide'); } };
      r.readAsText(f);
    });
    bImp.addEventListener('click',()=>inp.click());
    elNbtns.append(bDl,bImp,inp);
    setStatus('miroir local (F5 OK)');
  }

  // ===== Timer présentateur (avance / retard vs planning théorique) =====
  const elClock=document.getElementById('pv-clock');
  const elDelta=document.getElementById('pv-delta');
  const elTimerToggle=document.getElementById('pv-timer-toggle');
  const elTimerReset=document.getElementById('pv-timer-reset');
  const TIMER_KEY='rfe_timer';
  let timer={running:false,startedAt:null,elapsedBefore:0};
  try{ const s=JSON.parse(localStorage.getItem(TIMER_KEY)||'null'); if(s&&typeof s==='object'){ timer={running:!!s.running,startedAt:s.startedAt||null,elapsedBefore:+s.elapsedBefore||0}; } }catch(e){}

  function persistTimer(){ try{ localStorage.setItem(TIMER_KEY, JSON.stringify(timer)); }catch(e){} }
  function elapsedSec(){ return timer.elapsedBefore + (timer.running && timer.startedAt ? (Date.now()-timer.startedAt)/1000 : 0); }
  function started(){ return timer.running || timer.elapsedBefore>0; }

  // Heure théorique d'arrivée sur la diapo n (1-based), en secondes, par interpolation des jalons.
  function theoTime(n){
    const ks=Object.keys(MILESTONES).map(Number).filter(k=>!isNaN(k)).sort((a,b)=>a-b);
    if(ks.length<2) return null;                       // planning inexploitable
    if(n<=ks[0]) return MILESTONES[ks[0]]*60;
    if(n>=ks[ks.length-1]) return MILESTONES[ks[ks.length-1]]*60;
    let lo=ks[0];
    for(let i=0;i<ks.length-1;i++){ if(n>=ks[i]&&n<=ks[i+1]){ lo=ks[i]; break; } }
    const hi=ks[ks.indexOf(lo)+1], vLo=MILESTONES[lo], vHi=MILESTONES[hi];
    return (vLo + (vHi-vLo)*(n-lo)/(hi-lo))*60;
  }
  function fmt(sec){ sec=Math.max(0,Math.round(sec)); const m=Math.floor(sec/60), s=sec%60; return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }

  function updateClock(){
    const e=elapsedSec();
    elClock.textContent=fmt(e);
    const theo=theoTime(pcur+1);
    if(!started() || theo===null){ elDelta.textContent=''; elDelta.className=''; return; }
    const d=e-theo;                                    // >0 = retard, <0 = avance
    const ad=Math.abs(d);
    if(ad<5){ elDelta.textContent='• à l’heure'; elDelta.className='ontime'; }
    else if(d>0){ elDelta.textContent='• +'+fmt(ad)+' retard'; elDelta.className='late'; }
    else { elDelta.textContent='• −'+fmt(ad)+' avance'; elDelta.className='early'; }
  }
  function syncToggleLabel(){ elTimerToggle.textContent = timer.running ? '⏸ Pause' : (timer.elapsedBefore>0 ? '▶ Reprendre' : '▶ Démarrer'); }

  elTimerToggle.addEventListener('click',()=>{
    if(timer.running){ timer.elapsedBefore=elapsedSec(); timer.running=false; timer.startedAt=null; }
    else { timer.startedAt=Date.now(); timer.running=true; }
    persistTimer(); syncToggleLabel(); updateClock(); elTimerToggle.blur(); // évite une re-activation par « espace » (navigation)
  });
  elTimerReset.addEventListener('click',()=>{
    timer={running:false,startedAt:null,elapsedBefore:0};
    persistTimer(); syncToggleLabel(); updateClock(); elTimerReset.blur();
  });
  setInterval(updateClock,500);

  function nav(n){ if(window.opener && !window.opener.closed) window.opener.postMessage({type:'go',n},'*'); }
  elPrev.addEventListener('click',()=>nav(pcur-1));
  elNext.addEventListener('click',()=>nav(pcur+1));
  document.addEventListener('keydown',e=>{
    // Ne pas naviguer pendant la frappe dans un champ de saisie (notes du jour, etc.)
    const t=e.target;
    if(t && (t.tagName==='TEXTAREA'||t.tagName==='INPUT'||t.tagName==='SELECT'||t.isContentEditable)) return;
    if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') nav(pcur+1);
    if(e.key==='ArrowLeft'||e.key==='ArrowUp') nav(pcur-1);
  });

  function makeIframe(box,n){
    const f=document.createElement('iframe');
    f.src=BASE+'#bare&n='+n; f.className='pv-frame';
    box.appendChild(f); return f;
  }
  function setFrame(f,n){ try{ f.contentWindow.postMessage({type:'setSlide',n},'*'); }catch(e){} }

  function render(){
    elCounter.textContent=String(pcur+1).padStart(2,'0')+' / '+String(pN).padStart(2,'0');
    elPrev.disabled=pcur<=0; elNext.disabled=pcur>=pN-1;
    const nextN=Math.min(pcur+1,pN-1);
    if(!built){ ifA=makeIframe(boxA,pcur); ifB=makeIframe(boxB,nextN); built=true; }
    else { setFrame(ifA,pcur); setFrame(ifB,nextN); }
    fin.style.display=(pcur>=pN-1)?'flex':'none';   // « Fin » recouvre l'aperçu suivant
  }

  window.addEventListener('message',e=>{
    const m=e.data||{};
    if(m.type==='state'){
      commitDay();                 // sauve les notes de la diapo AFFICHÉE avant de bouger
      pcur=m.cur; pN=m.N;
      render();
      showNotes();                 // charge prépa + notes du jour de la nouvelle diapo
      updateClock();               // l'écart dépend de la diapo courante (A(pcur+1))
    }
  });
  showNotes();                     // panneaux remplis dès l'ouverture (diapo 1)
  syncToggleLabel(); updateClock();// état initial du timer (reprend après un F5)
  if(window.opener && !window.opener.closed) window.opener.postMessage({type:'presenterReady'},'*');
}
</script>
</body>
</html>
